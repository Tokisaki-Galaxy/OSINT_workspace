<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>时间线浏览器</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="toolbar card">
        <div class="toolbar-left">
          <h1>时间线浏览器</h1>
          <span id="dir-label" class="dir-label">未选择目录</span>
        </div>

        <div class="toolbar-right">
          <label class="field compact">
            <span>排序</span>
            <select id="sort">
              <option value="desc">新 → 旧</option>
              <option value="asc">旧 → 新</option>
            </select>
          </label>

          <label class="field compact">
            <span>开始</span>
            <input id="start" type="datetime-local" />
          </label>

          <label class="field compact">
            <span>结束</span>
            <input id="end" type="datetime-local" />
          </label>

          <button id="open-dir-btn" type="button" class="primary-btn">打开目录</button>
        </div>
      </header>

      <main class="main-layout">
        <aside class="left-pane card">
          <div class="left-head">
            <h2>时间线</h2>
            <input id="search" type="search" placeholder="搜索标题 / 作者 / 关键词" />
          </div>
          <ul id="timeline-list" class="timeline-list"></ul>
        </aside>

        <article class="right-pane card">
          <section id="meta" class="meta-wrap"></section>
          <section id="article" class="article markdown-body">
            <p class="empty-hint">请选择左侧文章</p>
          </section>
        </article>
      </main>
    </div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
